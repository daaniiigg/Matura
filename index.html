<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Matura</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Capa 1: tokens base -->
  <link rel="stylesheet" href="theme.css">
  <!-- Capa 2: design system (variables + componentes m-*) -->
  <link rel="stylesheet" href="design-system.css">
  <!-- Capa 3: estilos de aplicación -->
  <link rel="stylesheet" href="styles.css">
  <!-- Capa 4: overrides de página -->
  <link rel="stylesheet" href="modules-redesign.css">

  <!-- Dark mode sin flash -->
  <script>
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark-pending');
    }
  </script>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <header class="topbar">

    <div class="brand">
      <div class="brand-logo">🟣</div>
      <div class="brand-text">
        <h1>Matura</h1>
        <p>Learn smarter.</p>
      </div>
    </div>

    <nav>
      <a href="#/"           id="nav-modulos"   class="activo">Dashboard</a>
      <a href="#/ranking"    id="nav-ranking">Ranking</a>
      <a href="#/progreso"   id="nav-progreso">Progress</a>
      <a href="#/glosario"   id="nav-glosario">Library</a>
      <a href="#/calendario" id="nav-calendario">Calendar</a>
      <a href="#/sugerir"    id="nav-sugerir">Suggest</a>
      <a href="#/admin"      id="nav-admin">Admin</a>
    </nav>

    <div class="header-right">
      <input class="search" placeholder="Buscar cualquier tema...">
      <select id="selector-idioma" onchange="cambiarIdioma(this.value)">
        <option value="es">ES</option>
        <option value="en">EN</option>
        <option value="de">DE</option>
      </select>
      <div class="avatar" id="zona-usuario">DG</div>
      <button class="hamburger" id="hamburger-btn" aria-label="Abrir menú" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>

  </header>

  <!-- Aquí el "profesor" (app.js) pinta la pantalla que toque -->
  <main id="app"></main>

  <footer class="footer">
    <span id="texto-footer">Plataforma creada por Daniel · Tailor Hub · Basada en investigación con 29 fuentes académicas</span>
  </footer>

  <!-- Primero cargamos el temario (en sus 3 idiomas), después la lógica -->
  <script src="cursos/gemelos/data.js"></script>
  <script src="cursos/gemelos/data-en.js"></script>
  <script src="cursos/gemelos/data-de.js"></script>
  <script src="cursos/celulas/data.js"></script>
  <script>
    const CURSOS = [
      {
        id: "gemelos",
        titulo: "Gemelos Digitales",
        icono: "🔷",
        descripcion: "8 módulos basados en una investigación con 29 fuentes académicas e industriales.",
        proximamente: false,
      },
      {
        id: "celulas",
        titulo: "Biología Celular",
        icono: "🔬",
        descripcion: "Estructura, funciones y tipos de células — los fundamentos de la vida.",
        proximamente: false,
      },
    ];
  </script>
  <script src="app.js"></script>
</body>
</html>
