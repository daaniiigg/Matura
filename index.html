<!DOCTYPE html>
<html lang="es">
<head>

</head>

  <!-- Barra superior: siempre visible, permite volver al inicio -->

      <select id="selector-idioma" onchange="cambiarIdioma(this.value)" style="border:1px solid #e5e7eb;border-radius:6px;padding:3px 6px;font-size:.85rem">
